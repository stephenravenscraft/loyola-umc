<!-- Wrapper adds 20vh extra height so sticky sunburst pins for 20vh of scroll -->
<div class="sunburst-pin-wrapper">
  <div class="sunburst-container" data-sunburst="1">
    <object class="sunburst-svg-object" data="images/burst.svg" type="image/svg+xml" width="100%" height="100%">
        <p>Your browser does not support SVG. Please use a modern browser.</p>
    </object>
    <div class="sunburst-text">
      <p class="h1">
        <span class="sunburst-text--white">At Loyola University Chicago, we are expanding knowledge in the service of humanity.</span>
        <span class="sunburst-text--gold">This is a place where bright minds illuminate what matters.</span>
      </p>
    </div>
  </div>
</div>
